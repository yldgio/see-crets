name: Bug Report
description: Report a bug in see-crets
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        
        > ⚠️ **Security bug?** Do NOT use this form. See [SECURITY.md](../SECURITY.md) instead.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux (libsecret)
        - Linux (pass)
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: AI Runtime
      options:
        - GitHub Copilot CLI
        - OpenCode
        - Claude Code
        - Not applicable (CLI only)
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Enforcement Tier
      options:
        - Tier 1 (Skill only)
        - Tier 2 (Plugin)
        - Tier 3 (Hooks)
        - Not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: see-crets version
      placeholder: e.g. 0.1.0 or commit SHA
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `see-crets ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, error output, or anything else that might help. Do NOT paste secret values.
