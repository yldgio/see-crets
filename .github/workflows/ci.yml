name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install Linux vault tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools pass

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun run build

      - name: Validate install.ps1 syntax (Windows only)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          [scriptblock]::Create((Get-Content '.\install.ps1' -Raw)) | Out-Null
          Write-Host "install.ps1 syntax OK"

  install-sh:
    name: install.sh (shellcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate install.sh with shellcheck
        # shellcheck is pre-installed on ubuntu-latest GitHub-hosted runners
        run: shellcheck install.sh

      - name: Verify shebang
        run: head -1 install.sh | grep -q '^#!/usr/bin/env bash' && echo "Shebang OK"
