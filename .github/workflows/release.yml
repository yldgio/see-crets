name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist

          bun build ./src/cli.ts --compile \
            --target=bun-darwin-arm64 \
            --outfile ./dist/see-crets-macos-arm64

          bun build ./src/cli.ts --compile \
            --target=bun-darwin-x64 \
            --outfile ./dist/see-crets-macos-x64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-x64 \
            --outfile ./dist/see-crets-linux-x64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-x64-musl \
            --outfile ./dist/see-crets-linux-x64-musl

          bun build ./src/cli.ts --compile \
            --target=bun-linux-arm64 \
            --outfile ./dist/see-crets-linux-arm64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-arm64-musl \
            --outfile ./dist/see-crets-linux-arm64-musl

          bun build ./src/cli.ts --compile \
            --target=bun-windows-x64 \
            --outfile ./dist/see-crets-windows-x64.exe

      - name: Generate checksums
        working-directory: dist
        run: sha256sum see-crets-* > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/see-crets-macos-arm64
            dist/see-crets-macos-x64
            dist/see-crets-linux-x64
            dist/see-crets-linux-x64-musl
            dist/see-crets-linux-arm64
            dist/see-crets-linux-arm64-musl
            dist/see-crets-windows-x64.exe
            dist/checksums.txt
