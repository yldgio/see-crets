name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # Required for OIDC keyless signing via cosign

jobs:
  build-and-release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binaries
        run: |
          mkdir -p dist

          bun build ./src/cli.ts --compile \
            --target=bun-darwin-arm64 \
            --outfile ./dist/see-crets-macos-arm64

          bun build ./src/cli.ts --compile \
            --target=bun-darwin-x64 \
            --outfile ./dist/see-crets-macos-x64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-x64 \
            --outfile ./dist/see-crets-linux-x64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-x64-musl \
            --outfile ./dist/see-crets-linux-x64-musl

          bun build ./src/cli.ts --compile \
            --target=bun-linux-arm64 \
            --outfile ./dist/see-crets-linux-arm64

          bun build ./src/cli.ts --compile \
            --target=bun-linux-arm64-musl \
            --outfile ./dist/see-crets-linux-arm64-musl

          bun build ./src/cli.ts --compile \
            --target=bun-windows-x64 \
            --outfile ./dist/see-crets-windows-x64.exe

      - name: Generate checksums
        working-directory: dist
        run: sha256sum see-crets-* > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with cosign (keyless)
        run: cosign sign-blob --yes dist/checksums.txt --bundle dist/checksums.txt.bundle
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --current --strip header

      - name: Upload release assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            dist/see-crets-macos-arm64
            dist/see-crets-macos-x64
            dist/see-crets-linux-x64
            dist/see-crets-linux-x64-musl
            dist/see-crets-linux-arm64
            dist/see-crets-linux-arm64-musl
            dist/see-crets-windows-x64.exe
            dist/checksums.txt
            dist/checksums.txt.bundle
