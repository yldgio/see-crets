# git-cliff configuration for see-crets
# Generates CHANGELOG in Keep a Changelog format
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to `see-crets` will be documented in this file.\
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

---
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
---
"""
trim = true
footer = """
{% for release in releases %}\
{% if release.version %}\
{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
    https://github.com/yldgio/see-crets/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
    https://github.com/yldgio/see-crets/releases/tag/{{ release.version }}
{% endif %}\
{% else %}\
{% if release.previous.version %}\
[Unreleased]: https://github.com/yldgio/see-crets/compare/{{ release.previous.version }}...HEAD
{% else %}\
[Unreleased]: https://github.com/yldgio/see-crets/compare/HEAD...HEAD
{% endif %}\
{% endif %}\
{% endfor %}
"""

[git]
# parse the commits based on conventional commits spec
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  # strip trailing PR numbers like "(#42)" or "(closes #42)"
  { pattern = '\s*\((\w+\s)?#[0-9]+\)\s*$', replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^security", group = "Security" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^chore", skip = true },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
  { message = "^Merge", skip = true },
]
# drop commits that don't match any parser
filter_commits = true
# sort tags topologically
topo_order = false
# sort commits inside sections oldest-first
sort_commits = "oldest"
